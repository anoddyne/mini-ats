name: database
services:
  database:
    image: postgres:14.6
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=mini-ats
    ports:
      - "5432:5432"
    command: ["-c", "port=${DB_PORT:-5432}"]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d mini-ats" ]
      interval: 5s
      timeout: 5s
      retries: 5